<style>

let L='ko',cms={},logo=null,pLogos=[];
let fbLoaded=false,cmsContentVersion=null;

// Load from Firestore
async function load(){
  try{
    const doc=await db.collection('config').doc('cms').get();
    if(doc.exists){
      const d=doc.data();
      cmsContentVersion=d.cv||null;
      logo=d.l||null;
      pLogos=(d.p||[]).filter(x=>x);
      cms=CMS_TEXT_OVERRIDE_ENABLED&&d.cv===CONTENT_VERSION?(d.i||{}):{};
      fbLoaded=true;
      if(d.cv!==CONTENT_VERSION)console.log('CMS content version mismatch, using current defaults');
    }else{
      cmsContentVersion=null;
    }
  }catch(e){console.log('Firestore read failed, using defaults')}
}

// Save to Firestore
async function save(){
  try{
    const data={l:logo,p:pLogos,cv:CONTENT_VERSION};
    if(CMS_TEXT_OVERRIDE_ENABLED)data.i=cms;
    await db.collection('config').doc('cms').set(data);
    cmsContentVersion=CONTENT_VERSION;
  }catch(e){
    console.error('Save failed:',e);
    const m=document.getElementById('adm-err');if(m){m.textContent='儲存失敗，請確認權限';m.style.display='block';setTimeout(()=>m.style.display='none',3e3)}
  }
}

// Contact form
let lastSubmit=0;
async function submitForm(){
  const err=document.getElementById('form-err');
  err.style.display='none';
  // Honeypot
  if(document.getElementById('f-hp').value)return;
  // Rate limit
  if(Date.now()-lastSubmit<60000){err.textContent=L==='tc'?'請稍後再試':'잠시 후 다시 시도해주세요';err.style.display='block';return}
  const company=document.getElementById('f-company').value.trim();
  const name=document.getElementById('f-name').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const message=document.getElementById('con-ta').value.trim();
  if(!company||!name||!email||!message){err.textContent=L==='tc'?'請填寫所有欄位':'모든 항목을 입력해주세요';err.style.display='block';return}
  if(!email.includes('@')||!email.includes('.')){err.textContent=L==='tc'?'請輸入正確的 Email':'올바른 이메일을 입력해주세요';err.style.display='block';return}
  const btn=document.getElementById('con-sub');
  const origText=btn.textContent;
  btn.disabled=true;btn.style.opacity='.5';btn.textContent=L==='tc'?'送出中...':'전송 중...';
  try{
    await db.collection('messages').add({company,name,email,message,lang:L,time:firebase.firestore.FieldValue.serverTimestamp()});
    lastSubmit=Date.now();
    document.getElementById('form-fields').style.display='none';
    document.getElementById('suc-title').textContent=L==='tc'?'已收到您的訊息':'메시지가 접수되었습니다';
    document.getElementById('suc-desc').textContent=L==='tc'?'感謝您的洽詢，我們會盡快回覆。':'문의해 주셔서 감사합니다. 빠른 시일 내에 회신드리겠습니다.';
    document.getElementById('form-success').style.display='block';
  }catch(e){
    err.textContent=L==='tc'?'送出失敗，請稍後再試':'전송 실패, 다시 시도해주세요';err.style.display='block';
    btn.disabled=false;btn.style.opacity='1';btn.textContent=origText;
    console.error('Form submit error:',e);
  }
}

    ()=>`${fld('Label','net.lbl')}${fld('標題','net.t')}${fld('說明','net.p',1)}${[0,1,2,3].map(i=>`<div class="af-group">類型 ${i+1}</div><div class="af-row"><div class="af-field"><label>標題 KO</label><input type="text" class="af" data-lang="ko" data-key="nt${i}.t"></div><div class="af-field"><label>標題 TC</label><input type="text" class="af" data-lang="tc" data-key="nt${i}.t"></div></div><div class="af-row"><div class="af-field"><label>說明 KO</label><textarea class="af" data-lang="ko" data-key="nt${i}.p"></textarea></div><div class="af-field"><label>說明 TC</label><textarea class="af" data-lang="tc" data-key="nt${i}.p"></textarea></div></div>`).join('')}`,
    ()=>`<div class="af-group">合作夥伴 Logo</div><p style="font-family:var(--ui);font-size:11px;color:var(--t3);margin-bottom:10px">上傳幾個就顯示幾個。</p>${pLogos.length?`<div class="par-up-grid">${pLogos.map((img,i)=>`<div class="par-up-cell"><div class="pv"><img src="${img}"></div><button class="pu-rm" onclick="rmPar(${i})">移除</button></div>`).join('')}</div>`:'<p style="font-size:11px;color:var(--t3);margin:12px 0">尚未上傳</p>'}<button class="up-btn" onclick="document.getElementById('par-fi').click()" style="margin-top:10px">＋ 新增</button>${fld('標題','par.title')}${fld('備註','par.note',1)}`,
    ()=>`${fld('Label','con.lbl')}${fld('標題','con.h',1)}${fld('說明','con.p',1)}${fld('Email','con.email')}${fld('地點','con.loc')}${fld('語言','con.lang')}${fld('表單標題','con.fl')}${fld('欄位：公司','fl.co')}${fld('欄位：聯絡人','fl.nm')}${fld('欄位：訊息','fl.mg')}${fld('送出按鈕','con.sub')}${fld('placeholder','con.ta',1)}${fld('版權','f.copy')}`
  ];
  b.innerHTML=S[idx]();
  b.querySelectorAll('.af').forEach(el=>{const v=g(el.dataset.lang,el.dataset.key);if(el.tagName==='TEXTAREA'){if(!el.textContent.trim())el.value=v}else el.value=v});
}

async function saveAdm(){
  if(!cms.ko)cms.ko={};if(!cms.tc)cms.tc={};
  document.querySelectorAll('.af').forEach(el=>{const l=el.dataset.lang,k=el.dataset.key;if(!cms[l])cms[l]={};cms[l][k]=el.value;if(k.match(/^(nt[0-3]\.i)$/)){cms.tc[k]=el.value;cms.ko[k]=el.value}});
  await save();render();updateAdmVersion();const m=document.getElementById('adm-ok');m.style.display='block';setTimeout(()=>m.style.display='none',2e3);
}
async function resetAdm(){if(!confirm('確定重置？'))return;cms={};logo=null;pLogos=[];await db.collection('config').doc('cms').set({l:null,p:[],cv:CONTENT_VERSION});cmsContentVersion=CONTENT_VERSION;render();updateAdmVersion();sTab(cTab)}
async function rmPar(i){pLogos.splice(i,1);await save();rTab(8);render()}

document.getElementById('logo-fi').addEventListener('change',function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{logo=e.target.result;await save();render();rTab(0)};r.readAsDataURL(f);this.value=''});
document.getElementById('par-fi').addEventListener('change',function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{pLogos.push(e.target.result);await save();rTab(8);render()};r.readAsDataURL(f);this.value=''});

function initRv(){const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('v')})},{threshold:.08,rootMargin:'0px 0px -30px 0px'});document.querySelectorAll('.rv').forEach(el=>{el.classList.remove('v');o.observe(el)})}

function chkAdm(){if(location.hash==='#admin'||location.pathname==='/admin'){setTimeout(openAdm,100);history.replaceState(null,'',location.pathname==='/admin'?'/':location.pathname)}}
window.addEventListener('hashchange',chkAdm);
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey&&e.key==='A'){e.preventDefault();openAdm()}});
document.getElementById('adm-overlay').addEventListener('click',function(e){if(e.target===this)closeAdm()});

// Init: load from Firestore then render
(async function(){
  await load();
  render();
  chkAdm();
})();
</script>
</body>
</html>
