<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAST MEDIA | 皡翰娛樂 — Taiwan MMORPG Influencer & Guild Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#07080C;--bg-base:#0D0F16;--bg-card:#12151E;--bg-card2:#161922;--border:rgba(255,255,255,0.07);--border-accent:rgba(140,165,220,0.25);--accent-blue:#8CA5DC;--accent-gold:#C8A86E;--text-primary:#E8EAF0;--text-secondary:#8A8FA8;--text-muted:#4A4F66;--font-ui:'Outfit',sans-serif;--radius:4px;--section-gap:120px;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Noto Sans KR',sans-serif;font-size:15px;line-height:1.7;overflow-x:hidden;}
body.lang-tc{font-family:'Noto Sans TC',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;border-bottom:1px solid var(--border);background:rgba(7,8,12,0.88);backdrop-filter:blur(20px);}
.nav-logo{display:flex;align-items:center;text-decoration:none;gap:10px;}
.nav-logo img{height:38px;object-fit:contain;display:none;}
.nav-logo-text{display:flex;flex-direction:column;gap:1px;}
.nav-logo-en{font-family:var(--font-ui);font-weight:700;font-size:18px;letter-spacing:.12em;color:#fff;line-height:1;}
.nav-logo-cn{font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--text-muted);letter-spacing:.1em;line-height:1;}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none;}
.nav-links a{font-family:var(--font-ui);font-size:13px;color:var(--text-secondary);text-decoration:none;letter-spacing:.04em;transition:color .2s;}
.nav-links a:hover{color:var(--text-primary);}
.nav-right{display:flex;align-items:center;gap:16px;}
.lang-toggle{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.lang-btn{font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.08em;padding:5px 12px;background:none;border:none;color:var(--text-muted);cursor:pointer;transition:all .2s;}
.lang-btn.active{background:var(--accent-blue);color:var(--bg-deep);}
.nav-cta{font-family:var(--font-ui);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--bg-deep);background:var(--accent-gold);border:none;padding:9px 20px;cursor:pointer;border-radius:var(--radius);text-decoration:none;transition:opacity .2s;}
.nav-cta:hover{opacity:.85;}

/* HERO */
#home{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:0 48px;overflow:hidden;}
.hero-grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(140,165,220,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(140,165,220,0.04) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 80% 70% at 50% 50%,black 30%,transparent 80%);}
.hero-orb{position:absolute;border-radius:50%;filter:blur(120px);pointer-events:none;}
.hero-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(140,165,220,0.12) 0%,transparent 70%);top:-150px;right:-100px;}
.hero-orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(200,168,110,0.08) 0%,transparent 70%);bottom:50px;left:10%;}
.hero-content{position:relative;z-index:2;max-width:900px;}
.hero-tag{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border-accent);border-radius:2px;padding:7px 16px;margin-bottom:40px;background:rgba(140,165,220,0.05);}
.hero-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-blue);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.hero-tag-text{font-family:var(--font-ui);font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--accent-blue);}
.hero-headline{font-family:var(--font-ui);font-size:clamp(46px,7vw,90px);font-weight:700;line-height:1.0;letter-spacing:-.025em;color:#fff;margin-bottom:28px;}
.accent-gold{color:var(--accent-gold);}
.hero-sub{font-size:16px;font-weight:300;color:var(--text-secondary);max-width:560px;line-height:1.85;margin-bottom:50px;}
.hero-actions{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.btn-primary{font-family:var(--font-ui);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--bg-deep);background:var(--accent-gold);border:none;padding:14px 32px;cursor:pointer;border-radius:var(--radius);text-decoration:none;transition:all .2s;display:inline-block;}
.btn-primary:hover{background:#D9BC82;transform:translateY(-1px);}
.btn-secondary{font-family:var(--font-ui);font-size:13px;font-weight:500;letter-spacing:.06em;color:var(--text-secondary);background:none;border:1px solid var(--border);padding:13px 28px;cursor:pointer;border-radius:var(--radius);text-decoration:none;transition:all .2s;display:inline-block;}
.btn-secondary:hover{border-color:var(--accent-blue);color:var(--accent-blue);}
.hero-stats{position:absolute;bottom:60px;right:48px;display:flex;gap:48px;z-index:2;}
.hero-stat-num{font-family:var(--font-ui);font-size:32px;font-weight:700;color:#fff;line-height:1;}
.hero-stat-label{font-family:var(--font-ui);font-size:11px;color:var(--text-muted);letter-spacing:.08em;margin-top:4px;}
.hero-scroll{position:absolute;bottom:60px;left:48px;display:flex;align-items:center;gap:12px;z-index:2;}
.scroll-line{width:40px;height:1px;background:var(--text-muted);}
.scroll-text{font-family:var(--font-ui);font-size:11px;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;}

/* SECTIONS */
section{padding:var(--section-gap) 48px;position:relative;}
.section-inner{max-width:1200px;margin:0 auto;}
.section-header{margin-bottom:64px;}
.label{font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-blue);}
.section-title{font-family:var(--font-ui);font-size:clamp(32px,4vw,52px);font-weight:700;letter-spacing:-.02em;color:#fff;line-height:1.1;margin-top:16px;}
.section-desc{font-size:15px;color:var(--text-secondary);max-width:600px;margin-top:20px;line-height:1.8;}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border-accent),transparent);margin:0 auto;max-width:1200px;}

/* ABOUT */
#about{background:var(--bg-base);}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}
.big-statement{font-family:var(--font-ui);font-size:clamp(22px,3vw,34px);font-weight:600;color:#fff;line-height:1.4;letter-spacing:-.01em;margin-top:16px;}
.big-statement span{color:var(--accent-blue);}
.about-pillars{margin-top:36px;display:flex;flex-direction:column;gap:16px;}
.pillar{display:flex;gap:16px;align-items:flex-start;padding:18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);transition:border-color .2s;}
.pillar:hover{border-color:var(--border-accent);}
.pillar-num{font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--accent-blue);opacity:.6;min-width:28px;}
.pillar-content h4{font-family:var(--font-ui);font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:4px;}
.pillar-content p{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.about-right p{font-size:15px;color:var(--text-secondary);line-height:1.9;margin-bottom:20px;}
.about-highlight-box{border-left:2px solid var(--accent-gold);padding:20px 24px;background:rgba(200,168,110,0.05);border-radius:0 var(--radius) var(--radius) 0;margin:32px 0;}
.about-highlight-box p{font-size:14px;color:var(--text-primary);font-weight:500;margin:0;line-height:1.7;}

/* SERVICES */
#services{background:var(--bg-deep);}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.service-card{background:var(--bg-base);padding:38px 34px;transition:background .3s;}
.service-card:hover{background:var(--bg-card);}
.service-icon{width:38px;height:38px;border:1px solid var(--border-accent);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;margin-bottom:26px;}
.service-icon svg{width:17px;height:17px;stroke:var(--accent-blue);fill:none;stroke-width:1.5;}
.service-card h3{font-family:var(--font-ui);font-size:16px;font-weight:700;color:#fff;margin-bottom:12px;letter-spacing:-.01em;}
.service-card p{font-size:13px;color:var(--text-secondary);line-height:1.75;}
.service-tag{display:inline-block;margin-top:18px;font-family:var(--font-ui);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-blue);border:1px solid var(--border-accent);padding:4px 10px;border-radius:2px;}

/* INSIGHT */
#insight{background:var(--bg-base);}
.insight-intro{display:grid;grid-template-columns:1fr 1fr;gap:80px;margin-bottom:72px;align-items:center;}
.insight-intro-text h2{font-family:var(--font-ui);font-size:clamp(26px,3.5vw,42px);font-weight:700;color:#fff;line-height:1.15;letter-spacing:-.02em;margin-top:16px;}
.insight-intro-text p{margin-top:18px;font-size:14px;color:var(--text-secondary);line-height:1.8;}
.insight-callout{border:1px solid var(--border-accent);border-radius:6px;padding:36px;background:linear-gradient(135deg,rgba(140,165,220,0.05),rgba(200,168,110,0.03));}
.insight-callout-num{font-family:var(--font-ui);font-size:52px;font-weight:700;color:var(--accent-gold);line-height:1;margin-bottom:8px;}
.insight-callout-desc{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.insight-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.insight-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:30px 26px;position:relative;overflow:hidden;transition:border-color .3s,transform .2s;}
.insight-card:hover{border-color:var(--border-accent);transform:translateY(-2px);}
.insight-card-index{font-family:var(--font-ui);font-size:11px;font-weight:700;color:var(--accent-blue);letter-spacing:.15em;text-transform:uppercase;margin-bottom:18px;opacity:.6;}
.insight-card h4{font-family:var(--font-ui);font-size:15px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.3;}
.insight-card p{font-size:13px;color:var(--text-secondary);line-height:1.75;}
.insight-card-bar{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent-blue),transparent);width:0;transition:width .4s ease;}
.insight-card:hover .insight-card-bar{width:100%;}

/* NETWORK */
#network{background:var(--bg-deep);}
.network-layout{display:grid;grid-template-columns:380px 1fr;gap:80px;align-items:start;}
.network-left p{font-size:15px;color:var(--text-secondary);line-height:1.85;margin-top:18px;}
.network-metric{margin-top:40px;display:flex;flex-direction:column;}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);}
.metric-row:last-child{border-bottom:none;}
.metric-label{font-family:var(--font-ui);font-size:13px;color:var(--text-secondary);}
.metric-val{font-family:var(--font-ui);font-size:20px;font-weight:700;color:var(--accent-gold);}
.network-types{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.network-type-card{border:1px solid var(--border);border-radius:6px;padding:26px 22px;background:var(--bg-card);transition:all .2s;}
.network-type-card:hover{border-color:var(--border-accent);background:var(--bg-card2);}
.network-type-icon{font-size:20px;margin-bottom:12px;}
.network-type-card h4{font-family:var(--font-ui);font-size:15px;font-weight:700;color:#fff;margin-bottom:8px;}
.network-type-card p{font-size:13px;color:var(--text-secondary);line-height:1.65;}

/* PARTNERS */
#partners{background:var(--bg-base);}
.partners-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;max-width:960px;margin:0 auto;}
.partner-cell{flex:0 0 calc(25% - 2px);height:100px;background:var(--bg-base);display:flex;align-items:center;justify-content:center;transition:background .2s;}
.partner-cell:hover{background:var(--bg-card);}
.partner-cell img{max-height:54px;max-width:150px;object-fit:contain;filter:brightness(0.65) grayscale(0.2);transition:filter .2s;}
.partner-cell:hover img{filter:brightness(0.9) grayscale(0);}
.partner-placeholder{font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);opacity:.4;}
.partners-note{text-align:center;margin-top:24px;font-family:var(--font-ui);font-size:12px;color:var(--text-muted);letter-spacing:.06em;}

/* CONTACT */
#contact{background:var(--bg-deep);overflow:hidden;}
#contact::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(200,168,110,0.06) 0%,transparent 65%);pointer-events:none;}
.contact-layout{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}
.contact-left h2{font-family:var(--font-ui);font-size:clamp(28px,3.5vw,44px);font-weight:700;color:#fff;line-height:1.15;letter-spacing:-.02em;margin-top:16px;}
.contact-left h2 .line-gold{color:var(--accent-gold);}
.contact-left p{margin-top:22px;font-size:15px;color:var(--text-secondary);line-height:1.8;}
.contact-info{margin-top:36px;display:flex;flex-direction:column;gap:14px;}
.contact-info-row{display:flex;align-items:center;gap:12px;}
.contact-info-icon{width:32px;height:32px;border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.contact-info-text{font-size:14px;color:var(--text-secondary);}
.contact-info-text a{color:var(--accent-blue);text-decoration:none;}
.contact-form{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:38px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg-deep);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-family:inherit;font-size:14px;color:var(--text-primary);outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent-blue);}
.form-group select option{background:var(--bg-card);}
.form-group textarea{min-height:90px;resize:vertical;}
.form-submit{width:100%;padding:15px;background:var(--accent-gold);color:var(--bg-deep);font-family:var(--font-ui);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:var(--radius);cursor:pointer;transition:all .2s;margin-top:6px;}
.form-submit:hover{background:#D9BC82;transform:translateY(-1px);}

/* FOOTER */
footer{padding:38px 48px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg-deep);flex-wrap:wrap;gap:16px;}
.footer-logo{font-family:var(--font-ui);font-weight:700;font-size:15px;letter-spacing:.1em;color:var(--text-muted);cursor:pointer;user-select:none;}
.footer-copy{font-family:var(--font-ui);font-size:12px;color:var(--text-muted);}
.footer-links{display:flex;gap:20px;list-style:none;}
.footer-links a{font-family:var(--font-ui);font-size:12px;color:var(--text-muted);text-decoration:none;transition:color .2s;}
.footer-links a:hover{color:var(--text-secondary);}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-delay-1{transition-delay:.1s;}
.reveal-delay-2{transition-delay:.2s;}
.reveal-delay-3{transition-delay:.3s;}

/* ═══════════════════════════════
   ADMIN PANEL
═══════════════════════════════ */
#admin-trigger{position:fixed;bottom:20px;right:20px;z-index:8000;width:36px;height:36px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:50%;color:var(--text-muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
#admin-trigger:hover{background:rgba(255,255,255,0.08);color:var(--text-secondary);}
#admin-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);}
#admin-overlay.open{display:flex;align-items:center;justify-content:center;}
.admin-box{background:#0F1219;border:1px solid rgba(140,165,220,0.2);border-radius:10px;width:min(92vw,820px);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);flex-shrink:0;}
.admin-header h2{font-family:var(--font-ui);font-size:15px;font-weight:700;color:#fff;letter-spacing:.06em;}
.admin-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;}
.admin-close:hover{color:#fff;}
/* Login */
#admin-login{padding:40px;display:flex;flex-direction:column;gap:16px;align-items:center;}
#admin-login p{font-family:var(--font-ui);font-size:13px;color:var(--text-secondary);}
#admin-login input{background:var(--bg-deep);border:1px solid var(--border);border-radius:var(--radius);padding:11px 16px;font-size:14px;color:var(--text-primary);outline:none;width:260px;text-align:center;letter-spacing:.1em;}
#admin-login input:focus{border-color:var(--accent-blue);}
#admin-login button{padding:11px 32px;background:var(--accent-gold);color:var(--bg-deep);border:none;border-radius:var(--radius);font-family:var(--font-ui);font-size:13px;font-weight:700;cursor:pointer;}
#admin-login .login-err{color:#E87070;font-size:12px;font-family:var(--font-ui);}
/* Editor */
#admin-editor{display:none;flex-direction:column;flex:1;overflow:hidden;}
.admin-tabs{display:flex;gap:2px;padding:12px 16px;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.admin-tab{font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.08em;padding:7px 14px;background:none;border:1px solid transparent;border-radius:3px;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.admin-tab.active,.admin-tab:hover{background:rgba(140,165,220,0.1);border-color:var(--border-accent);color:var(--accent-blue);}
.admin-content{flex:1;overflow-y:auto;padding:24px;}
.admin-section{display:none;}
.admin-section.active{display:block;}
.admin-field{margin-bottom:18px;}
.admin-field label{display:block;font-family:var(--font-ui);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.admin-field input,.admin-field textarea{width:100%;background:var(--bg-deep);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-family:'Noto Sans KR','Noto Sans TC',var(--font-ui),sans-serif;font-size:13px;color:var(--text-primary);outline:none;transition:border-color .2s;}
.admin-field input:focus,.admin-field textarea:focus{border-color:var(--accent-blue);}
.admin-field textarea{resize:vertical;min-height:70px;}
.admin-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.admin-group-title{font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--accent-blue);margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.admin-group-title:first-child{margin-top:0;}
.admin-footer{display:flex;gap:10px;padding:14px 24px;border-top:1px solid var(--border);flex-shrink:0;}
.admin-save{padding:10px 28px;background:var(--accent-gold);color:var(--bg-deep);border:none;border-radius:var(--radius);font-family:var(--font-ui);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.06em;}
.admin-reset{padding:10px 20px;background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius);font-family:var(--font-ui);font-size:12px;cursor:pointer;}
.admin-reset:hover{border-color:#E87070;color:#E87070;}
.admin-saved-msg{font-family:var(--font-ui);font-size:12px;color:#6ECC8A;align-self:center;display:none;}
/* Logo upload */

.p-upload{background:rgba(140,165,220,0.1);border:1px solid var(--border-accent);color:var(--accent-blue);}
.p-remove{background:none;border:1px solid var(--border);color:var(--text-muted);}

let currentLang = 'ko';

let logoData = null;      // base64
let partnerLogos = Array(8).fill(null); // base64 array
const ADMIN_PASSWORD = 'vestmedia';

function loadState() {
  try {
    const s = localStorage.getItem('vm_cms');
    if (s) { const p = JSON.parse(s); cmsOverride = p.i18n||{}; logoData = p.logo||null; partnerLogos = p.partners||Array(8).fill(null); }
  } catch(e){}
}

function saveState() {
  localStorage.setItem('vm_cms', JSON.stringify({ i18n: cmsOverride, logo: logoData, partners: partnerLogos }));
}

function g(lang, key) {
  return (cmsOverride[lang]&&cmsOverride[lang][key]!==undefined) ? cmsOverride[lang][key] : D[lang][key]||'';
}

  document.getElementById('contact-select').innerHTML = [0,1,2,3,4,5].map(i=>`<option>${g(L,'sel.opt'+i)}</option>`).join('');
  document.getElementById('contact-textarea').placeholder = g(L,'con.textarea');
  document.getElementById('con-submit').textContent = g(L,'con.submit');

  // Footer
  document.getElementById('footer-copy').textContent = g(L,'footer.copy');
  document.getElementById('footer-links').innerHTML = `
    <li><a href="#about">${g(L,'fnav.about')}</a></li>
    <li><a href="#services">${g(L,'fnav.services')}</a></li>
    <li><a href="#contact">${g(L,'fnav.contact')}</a></li>`;

  // Body class for font
  document.body.className = L==='tc' ? 'lang-tc' : '';
  document.documentElement.lang = L==='ko' ? 'ko' : 'zh-TW';

  // Re-observe reveals
  setTimeout(initReveal, 50);
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-ko').classList.toggle('active', lang==='ko');
  document.getElementById('btn-tc').classList.toggle('active', lang==='tc');
  render();
}

// ══════════════════════════════════
// ADMIN PANEL
// ══════════════════════════════════
let currentTab = 0;
let pendingPartnerIdx = -1;

function openAdmin() {
  document.getElementById('admin-overlay').classList.add('open');
  document.getElementById('admin-login').style.display='flex';
  document.getElementById('admin-editor').style.display='none';
  document.getElementById('admin-pw').value='';
  document.getElementById('login-err').style.display='none';
}

function closeAdmin() {
  document.getElementById('admin-overlay').classList.remove('open');
}

function adminLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('admin-login').style.display='none';
    document.getElementById('admin-editor').style.display='flex';
    switchTab(0);
  } else {
    document.getElementById('login-err').style.display='block';
  }
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.admin-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderAdminContent(idx);
}

function field(label, keyKo, keyTc, multiline) {

  const cTag = multiline ? 'textarea' : 'input';

    <div class="admin-group-title">${label}</div>
    <div class="admin-row">
      <div class="admin-field">
        <label>🇰🇷 한국어</label>
        <${tag} class="af" data-lang="ko" data-key="${keyKo}">${multiline?g('ko',keyKo):''}</${cTag}>
        ${!multiline?`<script>document.querySelectorAll('.af[data-key="${keyKo}"][data-lang="ko"]').forEach(e=>e.value=g('ko','${keyKo}'))<\/script>`:''}
      </div>
      <div class="admin-field">
        <label>🇹🇼 繁體中文</label>
        <${tag} class="af" data-lang="tc" data-key="${keyTc||keyKo}">${multiline?g('tc',keyTc||keyKo):''}</${cTag}>
        ${!multiline?`<script>document.querySelectorAll('.af[data-key="${keyTc||keyKo}"][data-lang="tc"]').forEach(e=>e.value=g('tc','${keyTc||keyKo}'))<\/script>`:''}

}

function saveAdmin() {
  if (!cmsOverride.ko) cmsOverride.ko = {};
  if (!cmsOverride.tc) cmsOverride.tc = {};

  // Collect stat nums (shared)
  document.querySelectorAll('.af').forEach(el=>{
    const lang = el.dataset.lang;
    const key = el.dataset.key;
    if (!cmsOverride[lang]) cmsOverride[lang] = {};
    cmsOverride[lang][key] = el.value;
    // Mirror num keys to both langs
    if (key==='stat0.num'||key==='stat1.num'||key==='ins.num1'||key==='ins.num2'||key==='met0.val'||key==='met1.val'||key==='met2.val') {
      cmsOverride.tc[key] = el.value;
      cmsOverride.ko[key] = el.value;
    }
    // Mirror svc tags
    if (key.match(/svc\d\.tag/)) cmsOverride.tc[key] = el.value;
    // Mirror nt icons
    if (key.match(/nt\d\.icon/)) cmsOverride.tc[key] = el.value;
  });

  saveState();
  render();
  const msg = document.getElementById('saved-msg');
  msg.style.display='block';
  setTimeout(()=>msg.style.display='none', 2500);
}

function resetAdmin() {
  if (!confirm('確定要重置所有後台設定嗎？此操作無法復原。')) return;
  cmsOverride = {}; logoData = null; partnerLogos = Array(8).fill(null);
  localStorage.removeItem('vm_cms');
  render();
  switchTab(currentTab);
}

function startPartnerUpload(idx) {
  pendingPartnerIdx = idx;
  document.getElementById('partner-file-input').click();
}

function removePartner(idx) {
  partnerLogos[idx] = null;
  renderAdminContent(6);
  render();
}

// Logo upload
document.getElementById('logo-file-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => { logoData = e.target.result; render(); renderAdminContent(0); };
  r.readAsDataURL(file);
  this.value='';
});

// Partner upload
document.getElementById('partner-file-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file || pendingPartnerIdx<0) return;
  const r = new FileReader();
  r.onload = e => { partnerLogos[pendingPartnerIdx] = e.target.result; renderAdminContent(6); render(); };
  r.readAsDataURL(file);
  this.value=''; pendingPartnerIdx=-1;
});

// ══════════════════════════════════
// SCROLL REVEAL
// ══════════════════════════════════
function initReveal() {
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
  },{threshold:0.08,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.reveal').forEach(el=>{
    el.classList.remove('visible');
    obs.observe(el);
  });
}

// ══════════════════════════════════
// MISC
// ══════════════════════════════════
window.addEventListener('scroll',()=>{
  const nav=document.querySelector('nav');
  nav.style.borderBottomColor = window.scrollY>60?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.07)';
  const orb1=document.querySelector('.hero-orb-1');
  const orb2=document.querySelector('.hero-orb-2');
  if(orb1) orb1.style.transform=`translateY(${window.scrollY*0.12}px)`;
  if(orb2) orb2.style.transform=`translateY(${window.scrollY*0.07}px)`;
});

// Footer logo click 5x to open admin
let footerClicks=0,footerTimer=null;
document.getElementById('footer-logo-click').addEventListener('click',()=>{
  footerClicks++;
  clearTimeout(footerTimer);
  footerTimer=setTimeout(()=>footerClicks=0,2000);
  if(footerClicks>=5){footerClicks=0;openAdmin();}
});

// Close overlay on backdrop click
document.getElementById('admin-overlay').addEventListener('click',function(e){
  if(e.target===this)closeAdmin();
});

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
loadState();
render();
</script>
