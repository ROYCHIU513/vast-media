<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAST MEDIA | 皡翰娛樂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0f;--bg2:#0c0e14;--bg3:#10131a;--bd:rgba(255,255,255,.06);--bd2:rgba(130,155,200,.18);--blue:#8ca5dc;--gold:#c8a86e;--t1:#e4e6ec;--t2:#8a8fa6;--t3:#474c62;--ui:'Outfit',sans-serif;--gap:100px;--r:3px}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans KR',sans-serif;font-size:15px;line-height:1.75;overflow-x:hidden}
body.tc{font-family:'Noto Sans TC',sans-serif}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;border-bottom:1px solid var(--bd);background:rgba(8,10,15,.92);backdrop-filter:blur(16px)}
.n-logo{text-decoration:none;display:flex;flex-direction:column;gap:1px}
.n-logo img{height:34px;object-fit:contain;display:none}
.n-en{font-family:var(--ui);font-weight:700;font-size:16px;letter-spacing:.1em;color:#fff;line-height:1}
.n-cn{font-family:'Noto Sans TC',sans-serif;font-size:9px;color:var(--t3);letter-spacing:.08em;line-height:1}
.n-links{display:flex;gap:28px;list-style:none}
.n-links a{font-family:var(--ui);font-size:12px;color:var(--t2);text-decoration:none;letter-spacing:.03em;transition:color .2s}
.n-links a:hover{color:var(--t1)}
.n-right{display:flex;align-items:center;gap:14px}
.lang-toggle{display:flex;border:1px solid var(--bd);border-radius:2px;overflow:hidden}
.lang-btn{font-family:var(--ui);font-size:10px;font-weight:600;letter-spacing:.08em;padding:4px 10px;background:none;border:none;color:var(--t3);cursor:pointer;transition:.2s}
.lang-btn.on{background:var(--blue);color:var(--bg)}
.n-cta{font-family:var(--ui);font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--bg);background:var(--gold);border:none;padding:8px 18px;cursor:pointer;border-radius:var(--r);text-decoration:none;transition:.2s}
.n-cta:hover{opacity:.85}

/* LAYOUT */
section{padding:var(--gap) 48px;position:relative}
.inner{max-width:960px;margin:0 auto}
.lbl{font-family:var(--ui);font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:14px}
.sec-t{font-family:var(--ui);font-size:clamp(24px,3vw,36px);font-weight:600;color:#fff;line-height:1.2;letter-spacing:-.01em}
.sec-p{font-size:14px;color:var(--t2);line-height:1.85;margin-top:16px;max-width:600px}
.divider{width:100%;max-width:960px;height:1px;background:linear-gradient(90deg,transparent,var(--bd2),transparent);margin:0 auto}

/* HERO */
#home{min-height:100vh;display:flex;align-items:center;padding-top:64px}
.hero-inner{max-width:720px}
.hero-tag{font-family:var(--ui);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:32px;display:flex;align-items:center;gap:8px}
.hero-tag::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.hero-h{font-family:var(--ui);font-size:clamp(32px,4.5vw,56px);font-weight:700;line-height:1.1;letter-spacing:-.02em;color:#fff;margin-bottom:24px}
.hero-h .gold{color:var(--gold)}
.hero-p{font-size:15px;color:var(--t2);line-height:1.85;max-width:540px;margin-bottom:40px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn1{font-family:var(--ui);font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--bg);background:var(--gold);border:none;padding:12px 28px;cursor:pointer;border-radius:var(--r);text-decoration:none;transition:.2s;display:inline-block}
.btn1:hover{opacity:.85}
.btn2{font-family:var(--ui);font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--t2);background:none;border:1px solid var(--bd);padding:11px 24px;cursor:pointer;border-radius:var(--r);text-decoration:none;transition:.2s;display:inline-block}
.btn2:hover{border-color:var(--blue);color:var(--blue)}
.hero-stats{display:flex;gap:40px;margin-top:56px}
.h-stat-n{font-family:var(--ui);font-size:28px;font-weight:700;color:#fff}
.h-stat-l{font-family:var(--ui);font-size:10px;color:var(--t3);letter-spacing:.06em;margin-top:2px}

/* ABOUT */
#about{background:var(--bg2)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
.about-left .sec-t{margin-bottom:20px}
.about-left p{font-size:14px;color:var(--t2);line-height:1.85;margin-bottom:16px}
.about-quote{border-left:2px solid var(--gold);padding:16px 20px;background:rgba(200,168,110,.04);margin:24px 0;font-size:13px;color:var(--t1);line-height:1.7;font-weight:500}
.about-right{display:flex;flex-direction:column;gap:14px}
.a-card{padding:16px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg3);transition:.2s}
.a-card:hover{border-color:var(--bd2)}
.a-card h4{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px}
.a-card p{font-size:12px;color:var(--t2);line-height:1.6}

/* SERVICES */
#services{background:var(--bg)}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-top:48px}
.svc-card{background:var(--bg2);padding:32px 28px;transition:.2s}
.svc-card:hover{background:var(--bg3)}
.svc-card h3{font-family:var(--ui);font-size:14px;font-weight:600;color:#fff;margin-bottom:10px}
.svc-card p{font-size:13px;color:var(--t2);line-height:1.7}
.svc-tag{display:inline-block;margin-top:14px;font-family:var(--ui);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);border:1px solid var(--bd2);padding:3px 8px;border-radius:2px}

/* MARKET OBSERVATION */
#observation{background:var(--bg2)}
.obs-content{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;margin-top:40px}
.obs-text p{font-size:14px;color:var(--t2);line-height:1.85;margin-bottom:16px}
.obs-data{border:1px solid var(--bd2);border-radius:6px;padding:32px;background:linear-gradient(135deg,rgba(140,165,220,.03),rgba(200,168,110,.02))}
.obs-num{font-family:var(--ui);font-size:44px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:6px}
.obs-desc{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:24px}
.obs-link{font-family:var(--ui);font-size:12px;font-weight:600;color:var(--blue);text-decoration:none;letter-spacing:.04em;transition:.2s}
.obs-link:hover{color:var(--t1)}

/* MARKET INSIGHT PAGE */
#mi-page{background:var(--bg);display:none}
.mi-tabs{display:flex;gap:2px;margin:32px 0 40px;border:1px solid var(--bd);border-radius:4px;overflow:hidden;max-width:520px}
.mi-tab{flex:1;font-family:var(--ui);font-size:11px;font-weight:600;letter-spacing:.04em;padding:10px 16px;background:none;border:none;color:var(--t3);cursor:pointer;transition:.2s;text-align:center}
.mi-tab.on{background:rgba(140,165,220,.1);color:var(--blue)}
.mi-panel{display:none}
.mi-panel.on{display:block}
.mi-panel h3{font-family:var(--ui);font-size:20px;font-weight:600;color:#fff;margin-bottom:16px;line-height:1.3}
.mi-panel p{font-size:14px;color:var(--t2);line-height:1.85;margin-bottom:16px}
.mi-panel .mi-points{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.mi-panel .mi-pt{font-size:13px;color:var(--t2);padding-left:16px;position:relative;line-height:1.65}
.mi-panel .mi-pt::before{content:'—';position:absolute;left:0;color:var(--t3)}
.mi-cta{margin-top:56px;padding:40px;border:1px solid var(--bd2);border-radius:6px;background:linear-gradient(135deg,rgba(140,165,220,.03),rgba(200,168,110,.02));text-align:center}
.mi-cta h3{font-family:var(--ui);font-size:18px;font-weight:600;color:#fff;margin-bottom:10px}
.mi-cta p{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.7}

/* NETWORK */
#network{background:var(--bg2)}
.net-layout{display:grid;grid-template-columns:340px 1fr;gap:64px;align-items:start}
.net-left p{font-size:14px;color:var(--t2);line-height:1.85;margin-top:16px}
.net-metrics{margin-top:32px}
.met-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd)}
.met-row:last-child{border:none}
.met-label{font-family:var(--ui);font-size:12px;color:var(--t2)}
.met-val{font-family:var(--ui);font-size:18px;font-weight:700;color:var(--gold)}
.net-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.net-card{border:1px solid var(--bd);border-radius:var(--r);padding:22px 18px;background:var(--bg3);transition:.2s}
.net-card:hover{border-color:var(--bd2)}
.net-card-icon{font-size:18px;margin-bottom:10px}
.net-card h4{font-family:var(--ui);font-size:13px;font-weight:600;color:#fff;margin-bottom:6px}
.net-card p{font-size:12px;color:var(--t2);line-height:1.6}

/* PARTNERS */
#partners{background:var(--bg);padding:40px 0;overflow:hidden}
.par-wrap{position:relative}
.par-marquee{display:flex;overflow:hidden;mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);padding:12px 0}
.par-track{display:flex;gap:48px;align-items:center;animation:mq 28s linear infinite;flex-shrink:0;padding-right:48px}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.par-marquee:hover .par-track{animation-play-state:paused}
.par-item{flex-shrink:0;height:36px;display:flex;align-items:center}
.par-item img{max-height:32px;max-width:120px;object-fit:contain;filter:brightness(.5) grayscale(.3);transition:.3s}
.par-item:hover img{filter:brightness(.85) grayscale(0)}
.par-note{text-align:center;margin-top:12px;font-family:var(--ui);font-size:10px;color:var(--t3);line-height:1.7;max-width:500px;margin-left:auto;margin-right:auto;padding:0 24px}

/* CONTACT */
#contact{background:var(--bg2);overflow:hidden}
.con-layout{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
.con-left h2{font-family:var(--ui);font-size:clamp(22px,2.8vw,32px);font-weight:600;color:#fff;line-height:1.2;margin-top:14px}
.con-left h2 .gold{color:var(--gold)}
.con-left>p{margin-top:18px;font-size:14px;color:var(--t2);line-height:1.8}
.con-info{margin-top:28px;display:flex;flex-direction:column;gap:10px}
.con-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t2)}
.con-row a{color:var(--blue);text-decoration:none}
.con-form{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:32px}
.fg{margin-bottom:14px}
.fg label{display:block;font-family:var(--ui);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;font-family:inherit;font-size:13px;color:var(--t1);outline:none;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{min-height:80px;resize:vertical}
.fg select option{background:var(--bg3)}
.con-submit{width:100%;padding:13px;background:var(--gold);color:var(--bg);font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.08em;border:none;border-radius:var(--r);cursor:pointer;transition:.2s;margin-top:4px}
.con-submit:hover{opacity:.85}

/* FOOTER */
footer{padding:32px 48px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--bg);flex-wrap:wrap;gap:12px}
.f-logo{font-family:var(--ui);font-weight:700;font-size:14px;letter-spacing:.08em;color:var(--t3);cursor:pointer;user-select:none}
.f-copy{font-family:var(--ui);font-size:11px;color:var(--t3)}
.f-links{display:flex;gap:16px;list-style:none}
.f-links a{font-family:var(--ui);font-size:11px;color:var(--t3);text-decoration:none;transition:.2s}
.f-links a:hover{color:var(--t2)}

/* REVEAL */
.rv{opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s}
.rv.v{opacity:1;transform:none}

/* ADMIN */
#adm-overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.88);backdrop-filter:blur(8px)}
#adm-overlay.open{display:flex;align-items:center;justify-content:center}
.adm-box{background:#0f1219;border:1px solid rgba(140,165,220,.2);border-radius:8px;width:min(92vw,860px);max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.adm-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--bd);flex-shrink:0}
.adm-hd h2{font-family:var(--ui);font-size:14px;font-weight:700;color:#fff;letter-spacing:.05em}
.adm-x{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer}
.adm-x:hover{color:#fff}
#adm-login{padding:36px;display:flex;flex-direction:column;gap:14px;align-items:center}
#adm-login p{font-family:var(--ui);font-size:12px;color:var(--t2)}
#adm-login input{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--t1);outline:none;width:240px;text-align:center;letter-spacing:.08em}
#adm-login input:focus{border-color:var(--blue)}
#adm-login button{padding:10px 28px;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-family:var(--ui);font-size:12px;font-weight:700;cursor:pointer}
#adm-login .err{color:#e87070;font-size:11px;font-family:var(--ui)}
#adm-editor{display:none;flex-direction:column;flex:1;overflow:hidden}
.adm-tabs{display:flex;gap:2px;padding:10px 14px;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.adm-tab{font-family:var(--ui);font-size:10px;font-weight:600;letter-spacing:.06em;padding:6px 12px;background:none;border:1px solid transparent;border-radius:2px;color:var(--t3);cursor:pointer;white-space:nowrap;transition:.15s}
.adm-tab.on,.adm-tab:hover{background:rgba(140,165,220,.1);border-color:var(--bd2);color:var(--blue)}
.adm-body{flex:1;overflow-y:auto;padding:20px}
.adm-ft{display:flex;gap:8px;padding:12px 22px;border-top:1px solid var(--bd);flex-shrink:0}
.adm-save{padding:9px 24px;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-family:var(--ui);font-size:11px;font-weight:700;cursor:pointer}
.adm-reset{padding:9px 18px;background:none;border:1px solid var(--bd);color:var(--t3);border-radius:var(--r);font-family:var(--ui);font-size:11px;cursor:pointer}
.adm-reset:hover{border-color:#e87070;color:#e87070}
.adm-ok{font-family:var(--ui);font-size:11px;color:#6ecc8a;align-self:center;display:none}
.af-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.af-group{font-family:var(--ui);font-size:12px;font-weight:700;color:var(--blue);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.af-group:first-child{margin-top:0}
.af-field{margin-bottom:14px}
.af-field label{display:block;font-family:var(--ui);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.af-field input,.af-field textarea{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;font-family:'Noto Sans KR','Noto Sans TC',var(--ui),sans-serif;font-size:12px;color:var(--t1);outline:none;transition:.2s}
.af-field input:focus,.af-field textarea:focus{border-color:var(--blue)}
.af-field textarea{resize:vertical;min-height:60px}
.logo-area{display:flex;align-items:center;gap:14px;margin-top:4px}
.logo-pv{width:100px;height:42px;border:1px dashed var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg)}
.logo-pv img{max-width:90px;max-height:36px;object-fit:contain}
.up-btn{font-family:var(--ui);font-size:10px;font-weight:600;padding:6px 14px;background:rgba(140,165,220,.1);border:1px solid var(--bd2);color:var(--blue);border-radius:var(--r);cursor:pointer}
.rm-btn{font-family:var(--ui);font-size:10px;padding:6px 12px;background:none;border:1px solid var(--bd);color:var(--t3);border-radius:var(--r);cursor:pointer}
.par-up-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
.par-up-cell{border:1px dashed var(--bd);border-radius:var(--r);padding:8px;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--bg)}
.par-up-cell .pv{width:100%;height:36px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.par-up-cell .pv img{max-width:100%;max-height:32px;object-fit:contain}
.par-up-cell button{font-size:9px;padding:3px 7px;border-radius:2px;cursor:pointer;font-family:var(--ui)}
.pu-rm{background:none;border:1px solid var(--bd);color:var(--t3)}

/* RESPONSIVE */
@media(max-width:1024px){nav{padding:0 24px}.n-links{display:none}section{padding:72px 24px}.about-grid,.obs-content,.net-layout,.con-layout{grid-template-columns:1fr;gap:40px}.svc-grid{grid-template-columns:1fr 1fr}.af-row{grid-template-columns:1fr}footer{padding:20px 24px}}
@media(max-width:640px){:root{--gap:56px}.hero-h{font-size:28px}.svc-grid{grid-template-columns:1fr}.net-cards{grid-template-columns:1fr}.hero-stats{flex-direction:column;gap:16px}.hero-btns{flex-direction:column;align-items:flex-start}footer{flex-direction:column;align-items:flex-start}.par-up-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<nav>
  <a class="n-logo" href="#home" id="nav-logo">
    <img id="logo-img" alt="VAST MEDIA">
    <div id="logo-text"><span class="n-en">VAST MEDIA</span><span class="n-cn">皡翰娛樂</span></div>
  </a>
  <ul class="n-links" id="nav-links"></ul>
  <div class="n-right">
    <div class="lang-toggle">
      <button class="lang-btn on" id="btn-ko" onclick="setLang('ko')">KO</button>
      <button class="lang-btn" id="btn-tc" onclick="setLang('tc')">TC</button>
    </div>
    <a href="#contact" class="n-cta" id="nav-cta"></a>
  </div>
</nav>

<section id="home"><div class="inner hero-inner">
  <div class="hero-tag" id="hero-tag"></div>
  <h1 class="hero-h" id="hero-h"></h1>
  <p class="hero-p" id="hero-p"></p>
  <div class="hero-btns">
    <a href="#contact" class="btn1" id="hero-b1"></a>
    <a href="#services" class="btn2" id="hero-b2"></a>
  </div>
  <div class="hero-stats" id="hero-stats"></div>
</div></section>

<div class="divider"></div>

<section id="about"><div class="inner">
  <div class="about-grid">
    <div class="about-left rv">
      <p class="lbl" id="abt-lbl"></p>
      <h2 class="sec-t" id="abt-t"></h2>
      <p id="abt-p1"></p>
      <p id="abt-p2"></p>
      <div class="about-quote" id="abt-q"></div>
    </div>
    <div class="about-right rv" id="abt-cards"></div>
  </div>
</div></section>

<div class="divider"></div>

<section id="services"><div class="inner">
  <div class="rv">
    <p class="lbl" id="svc-lbl"></p>
    <h2 class="sec-t" id="svc-t"></h2>
    <p class="sec-p" id="svc-p"></p>
  </div>
  <div class="svc-grid" id="svc-grid"></div>
</div></section>

<div class="divider"></div>

<section id="observation"><div class="inner">
  <p class="lbl rv" id="obs-lbl"></p>
  <h2 class="sec-t rv" id="obs-t"></h2>
  <div class="obs-content">
    <div class="obs-text rv">
      <p id="obs-p1"></p>
      <p id="obs-p2"></p>
    </div>
    <div class="obs-data rv">
      <div class="obs-num" id="obs-n1"></div>

let L='ko',cms={},logo=null,pLogos=[];
const PW='vestmedia';

function load(){try{const s=localStorage.getItem('vm');if(s){const p=JSON.parse(s);cms=p.i||{};logo=p.l||null;pLogos=(p.p||[]).filter(x=>x)}}catch(e){}}
function save(){localStorage.setItem('vm',JSON.stringify({i:cms,l:logo,p:pLogos}))}
function g(l,k){return(cms[l]&&cms[l][k]!==undefined)?cms[l][k]:D[l][k]||''}

  document.getElementById('nav-links').innerHTML=nl.map(([h,k])=>`<li><a href="${h}">${g(L,k)}</a></li>`).join('');

  // Hero

  document.getElementById('f-links').innerHTML=`<li><a href="#about">${g(L,'fn.about')}</a></li><li><a href="#services">${g(L,'fn.svc')}</a></li><li><a href="#contact">${g(L,'fn.con')}</a></li>`;
  document.body.className=L==='tc'?'tc':'';
  document.documentElement.lang=L==='ko'?'ko':'zh-TW';
  setTimeout(initRv,50);
}

    ()=>`${fld('Label','net.lbl')}${fld('標題','net.t')}${fld('說明','net.p',1)}${[0,1,2].map(i=>`<div class="af-group">指標 ${i+1}</div><div class="af-row"><div class="af-field"><label>標籤 KO</label><input type="text" class="af" data-lang="ko" data-key="met${i}.l"></div><div class="af-field"><label>標籤 TC</label><input type="text" class="af" data-lang="tc" data-key="met${i}.l"></div></div><div class="af-field"><label>數值</label><input type="text" class="af" data-lang="ko" data-key="met${i}.v"></div>`).join('')}${[0,1,2,3].map(i=>`<div class="af-group">類型 ${i+1}</div><div class="af-field"><label>Icon</label><input type="text" class="af" data-lang="ko" data-key="nt${i}.i" style="width:60px"></div><div class="af-row"><div class="af-field"><label>標題 KO</label><input type="text" class="af" data-lang="ko" data-key="nt${i}.t"></div><div class="af-field"><label>標題 TC</label><input type="text" class="af" data-lang="tc" data-key="nt${i}.t"></div></div><div class="af-row"><div class="af-field"><label>說明 KO</label><textarea class="af" data-lang="ko" data-key="nt${i}.p"></textarea></div><div class="af-field"><label>說明 TC</label><textarea class="af" data-lang="tc" data-key="nt${i}.p"></textarea></div></div>`).join('')}`,
    ()=>`<div class="af-group">合作夥伴 Logo</div><p style="font-family:var(--ui);font-size:11px;color:var(--t3);margin-bottom:10px">上傳幾個就顯示幾個，前台跑馬燈呈現。</p>${pLogos.length?`<div class="par-up-grid">${pLogos.map((img,i)=>`<div class="par-up-cell"><div class="pv"><img src="${img}"></div><button class="pu-rm" onclick="rmPar(${i})">移除</button></div>`).join('')}</div>`:'<p style="font-size:11px;color:var(--t3);margin:12px 0">尚未上傳</p>'}<button class="up-btn" onclick="document.getElementById('par-fi').click()" style="margin-top:10px">＋ 新增 Logo</button>${fld('備註','par.note',1)}`,
    ()=>`${fld('Label','con.lbl')}${fld('標題','con.h',1)}${fld('說明','con.p',1)}${fld('地點','con.loc')}${fld('語言','con.lang')}${fld('版權','f.copy')}`
  ];
  b.innerHTML=S[idx]();
  b.querySelectorAll('.af').forEach(el=>{const v=g(el.dataset.lang,el.dataset.key);if(el.tagName==='TEXTAREA'){if(!el.textContent.trim())el.value=v}else el.value=v});
}

function saveAdm(){
  if(!cms.ko)cms.ko={};if(!cms.tc)cms.tc={};
  document.querySelectorAll('.af').forEach(el=>{
    const l=el.dataset.lang,k=el.dataset.key;if(!cms[l])cms[l]={};cms[l][k]=el.value;
    if(k.match(/^(stat[01]\.n|obs\.n[12]|met[012]\.v|nt[0-3]\.i)$/)){cms.tc[k]=el.value;cms.ko[k]=el.value}
  });
  save();render();
  const m=document.getElementById('adm-ok');m.style.display='block';setTimeout(()=>m.style.display='none',2e3);
}
function resetAdm(){if(!confirm('確定重置？'))return;cms={};logo=null;pLogos=[];localStorage.removeItem('vm');render();sTab(cTab)}
function rmPar(i){pLogos.splice(i,1);save();rTab(7);render()}

document.getElementById('logo-fi').addEventListener('change',function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{logo=e.target.result;save();render();rTab(0)};r.readAsDataURL(f);this.value=''});
document.getElementById('par-fi').addEventListener('change',function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{pLogos.push(e.target.result);save();rTab(7);render()};r.readAsDataURL(f);this.value=''});

function initRv(){const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('v')})},{threshold:.08,rootMargin:'0px 0px -30px 0px'});document.querySelectorAll('.rv').forEach(el=>{el.classList.remove('v');o.observe(el)})}

// Admin access
function chkAdm(){if(location.hash==='#admin'||location.pathname==='/admin'){setTimeout(openAdm,100);history.replaceState(null,'',location.pathname==='/admin'?'/':location.pathname)}}
window.addEventListener('hashchange',chkAdm);
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey&&e.key==='A'){e.preventDefault();openAdm()}});
document.getElementById('adm-overlay').addEventListener('click',function(e){if(e.target===this)closeAdm()});

load();render();chkAdm();
</script>
</body>
</html>
