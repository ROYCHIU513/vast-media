<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAST MEDIA | 皡翰娛樂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0f;--bg2:#0c0e14;--bg3:#10131a;--bd:rgba(255,255,255,.06);--bd2:rgba(130,155,200,.18);--blue:#8ca5dc;--gold:#c8a86e;--t1:#e4e6ec;--t2:#8a8fa6;--t3:#474c62;--ui:'Outfit',sans-serif;--r:3px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans KR',sans-serif;font-size:15px;line-height:1.75;overflow-x:hidden}
body.tc{font-family:'Noto Sans TC',sans-serif}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;border-bottom:1px solid var(--bd);background:rgba(8,10,15,.92);backdrop-filter:blur(16px)}
.n-logo{text-decoration:none;display:flex;flex-direction:column;gap:1px}
.n-logo img{height:34px;object-fit:contain;display:none}
.n-en{font-family:var(--ui);font-weight:700;font-size:16px;letter-spacing:.1em;color:#fff;line-height:1}
.n-cn{font-family:'Noto Sans TC',sans-serif;font-size:9px;color:var(--t3);letter-spacing:.08em;line-height:1}
.n-links{display:flex;gap:28px;list-style:none}
.n-links a{font-family:var(--ui);font-size:12px;color:var(--t2);text-decoration:none;letter-spacing:.03em;transition:color .2s}
.n-links a:hover{color:var(--t1)}
.n-right{display:flex;align-items:center;gap:14px}
.lang-toggle{display:flex;border:1px solid var(--bd);border-radius:2px;overflow:hidden}
.lang-btn{font-family:var(--ui);font-size:10px;font-weight:600;letter-spacing:.08em;padding:4px 10px;background:none;border:none;color:var(--t3);cursor:pointer;transition:.2s}
.lang-btn.on{background:var(--blue);color:var(--bg)}
.n-cta{font-family:var(--ui);font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--bg);background:var(--gold);border:none;padding:8px 18px;cursor:pointer;border-radius:var(--r);text-decoration:none;transition:.2s}
.n-cta:hover{opacity:.85}

section{padding:120px 48px;position:relative}
.inner{max-width:880px;margin:0 auto}
.lbl{font-family:var(--ui);font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:14px}
.sec-t{font-family:var(--ui);font-size:clamp(22px,2.8vw,32px);font-weight:600;color:#fff;line-height:1.25;letter-spacing:-.01em}
.divider{width:100%;max-width:880px;height:1px;background:linear-gradient(90deg,transparent,var(--bd2),transparent);margin:0 auto}

#home{min-height:100vh;display:flex;align-items:center;padding-top:64px}
.hero-inner{max-width:640px}
.hero-tag{font-family:var(--ui);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:32px;display:flex;align-items:center;gap:8px}
.hero-tag::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.hero-h{font-family:var(--ui);font-size:clamp(28px,4vw,48px);font-weight:700;line-height:1.12;letter-spacing:-.02em;color:#fff;margin-bottom:24px}
.hero-h .gold{color:var(--gold)}
.hero-p{font-size:15px;color:var(--t2);line-height:1.85;max-width:520px;margin-bottom:40px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn1{font-family:var(--ui);font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--bg);background:var(--gold);border:none;padding:12px 28px;cursor:pointer;border-radius:var(--r);text-decoration:none;transition:.2s;display:inline-block}
.btn1:hover{opacity:.85}
.btn2{font-family:var(--ui);font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--t2);background:none;border:1px solid var(--bd);padding:11px 24px;cursor:pointer;border-radius:var(--r);text-decoration:none;transition:.2s;display:inline-block}
.btn2:hover{border-color:var(--blue);color:var(--blue)}

#about{background:var(--bg2)}
.about-cols{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start}
.about-left p{font-size:14px;color:var(--t2);line-height:1.9;margin-bottom:18px}
.about-quote{border-left:2px solid var(--gold);padding:14px 20px;background:rgba(200,168,110,.03);margin:28px 0;font-size:13px;color:var(--t1);line-height:1.75;font-weight:400}
.about-right p{font-size:14px;color:var(--t2);line-height:1.9;margin-bottom:18px}

#services{background:var(--bg)}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-top:48px}
.svc-card{background:var(--bg2);padding:32px 26px;transition:.2s}
.svc-card:hover{background:var(--bg3)}
.svc-card h3{font-family:var(--ui);font-size:13px;font-weight:600;color:#fff;margin-bottom:10px}
.svc-card p{font-size:12px;color:var(--t2);line-height:1.7}
.svc-tag{display:inline-block;margin-top:14px;font-family:var(--ui);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);border:1px solid var(--bd2);padding:3px 8px;border-radius:2px}

#observation{background:var(--bg2)}
.obs-cols{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start;margin-top:40px}
.obs-left p{font-size:14px;color:var(--t2);line-height:1.9;margin-bottom:18px}
.obs-right{border:1px solid var(--bd);border-radius:6px;padding:32px;background:var(--bg3)}
.obs-right h4{font-family:var(--ui);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:20px}
.obs-right p{font-size:13px;color:var(--t2);line-height:1.85;margin-bottom:14px}
.obs-right p:last-of-type{margin-bottom:0}
.obs-link{display:inline-block;margin-top:24px;font-family:var(--ui);font-size:12px;font-weight:500;color:var(--blue);text-decoration:none;letter-spacing:.03em;transition:.2s}
.obs-link:hover{color:var(--t1)}

#mi-page{background:var(--bg);display:none}
.mi-tabs{display:flex;gap:2px;margin:32px 0 40px;border:1px solid var(--bd);border-radius:4px;overflow:hidden;max-width:520px}
.mi-tab{flex:1;font-family:var(--ui);font-size:11px;font-weight:600;letter-spacing:.04em;padding:10px 16px;background:none;border:none;color:var(--t3);cursor:pointer;transition:.2s;text-align:center}
.mi-tab.on{background:rgba(140,165,220,.1);color:var(--blue)}
.mi-panel{display:none}
.mi-panel.on{display:block}
.mi-panel h3{font-family:var(--ui);font-size:18px;font-weight:600;color:#fff;margin-bottom:16px;line-height:1.3}
.mi-panel p{font-size:14px;color:var(--t2);line-height:1.9;margin-bottom:16px}
.mi-panel .mi-pts{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.mi-panel .mi-pt{font-size:13px;color:var(--t2);padding-left:16px;position:relative;line-height:1.65}
.mi-panel .mi-pt::before{content:'—';position:absolute;left:0;color:var(--t3)}
.mi-cta{margin-top:64px;padding:40px;border:1px solid var(--bd2);border-radius:6px;background:linear-gradient(135deg,rgba(140,165,220,.03),rgba(200,168,110,.02));text-align:center}
.mi-cta h3{font-family:var(--ui);font-size:18px;font-weight:600;color:#fff;margin-bottom:10px}
.mi-cta p{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.7}

#network{background:var(--bg2)}
.net-cols{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start}
.net-left p{font-size:14px;color:var(--t2);line-height:1.9;margin-bottom:18px}
.net-right{display:flex;flex-direction:column;gap:24px}
.net-item h4{font-family:var(--ui);font-size:13px;font-weight:600;color:#fff;margin-bottom:4px;letter-spacing:.02em}
.net-item p{font-size:13px;color:var(--t2);line-height:1.7}
.net-item{padding-left:16px;border-left:1px solid var(--bd2)}

#partners{background:var(--bg);padding:40px 0;overflow:hidden}
.par-wrap{position:relative}
.par-marquee{display:flex;overflow:hidden;mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);padding:12px 0}
.par-track{display:flex;gap:48px;align-items:center;animation:mq 28s linear infinite;flex-shrink:0;padding-right:48px}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.par-marquee:hover .par-track{animation-play-state:paused}
.par-item{flex-shrink:0;height:36px;display:flex;align-items:center}
.par-item img{max-height:32px;max-width:120px;object-fit:contain;filter:brightness(.5) grayscale(.3);transition:.3s}
.par-item:hover img{filter:brightness(.85) grayscale(0)}
.par-note{text-align:center;margin-top:12px;font-family:var(--ui);font-size:10px;color:var(--t3);line-height:1.7;max-width:500px;margin-left:auto;margin-right:auto;padding:0 24px}

#contact{background:var(--bg2);overflow:hidden}
.con-cols{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start}
.con-left h2{font-family:var(--ui);font-size:clamp(20px,2.5vw,28px);font-weight:600;color:#fff;line-height:1.25;margin-top:14px}
.con-left h2 .gold{color:var(--gold)}
.con-left>p{margin-top:18px;font-size:14px;color:var(--t2);line-height:1.85}
.con-info{margin-top:28px;display:flex;flex-direction:column;gap:10px}
.con-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t2)}
.con-row a{color:var(--blue);text-decoration:none}
.con-form{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:32px}
.fg{margin-bottom:14px}
.fg label{display:block;font-family:var(--ui);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;font-family:inherit;font-size:13px;color:var(--t1);outline:none;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{min-height:80px;resize:vertical}
.fg select option{background:var(--bg3)}
.con-submit{width:100%;padding:13px;background:var(--gold);color:var(--bg);font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.08em;border:none;border-radius:var(--r);cursor:pointer;transition:.2s;margin-top:4px}
.con-submit:hover{opacity:.85}

footer{padding:32px 48px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--bg);flex-wrap:wrap;gap:12px}
.f-logo{font-family:var(--ui);font-weight:700;font-size:14px;letter-spacing:.08em;color:var(--t3)}
.f-copy{font-family:var(--ui);font-size:11px;color:var(--t3)}
.f-links{display:flex;gap:16px;list-style:none}
.f-links a{font-family:var(--ui);font-size:11px;color:var(--t3);text-decoration:none;transition:.2s}
.f-links a:hover{color:var(--t2)}

.rv{opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s}.rv.v{opacity:1;transform:none}

#adm-overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.88);backdrop-filter:blur(8px)}
#adm-overlay.open{display:flex;align-items:center;justify-content:center}
.adm-box{background:#0f1219;border:1px solid rgba(140,165,220,.2);border-radius:8px;width:min(92vw,860px);max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.adm-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--bd);flex-shrink:0}
.adm-hd h2{font-family:var(--ui);font-size:14px;font-weight:700;color:#fff;letter-spacing:.05em}
.adm-x{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer}.adm-x:hover{color:#fff}
#adm-login{padding:36px;display:flex;flex-direction:column;gap:14px;align-items:center}
#adm-login p{font-family:var(--ui);font-size:12px;color:var(--t2)}
#adm-login input{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--t1);outline:none;width:240px;text-align:center;letter-spacing:.08em}
#adm-login input:focus{border-color:var(--blue)}
#adm-login button{padding:10px 28px;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-family:var(--ui);font-size:12px;font-weight:700;cursor:pointer}
#adm-login .err{color:#e87070;font-size:11px;font-family:var(--ui)}
#adm-editor{display:none;flex-direction:column;flex:1;overflow:hidden}
.adm-tabs{display:flex;gap:2px;padding:10px 14px;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.adm-tab{font-family:var(--ui);font-size:10px;font-weight:600;letter-spacing:.06em;padding:6px 12px;background:none;border:1px solid transparent;border-radius:2px;color:var(--t3);cursor:pointer;white-space:nowrap;transition:.15s}
.adm-tab.on,.adm-tab:hover{background:rgba(140,165,220,.1);border-color:var(--bd2);color:var(--blue)}
.adm-body{flex:1;overflow-y:auto;padding:20px}
.adm-ft{display:flex;gap:8px;padding:12px 22px;border-top:1px solid var(--bd);flex-shrink:0}
.adm-save{padding:9px 24px;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-family:var(--ui);font-size:11px;font-weight:700;cursor:pointer}
.adm-reset{padding:9px 18px;background:none;border:1px solid var(--bd);color:var(--t3);border-radius:var(--r);font-family:var(--ui);font-size:11px;cursor:pointer}
.adm-reset:hover{border-color:#e87070;color:#e87070}
.adm-ok{font-family:var(--ui);font-size:11px;color:#6ecc8a;align-self:center;display:none}
.af-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.af-group{font-family:var(--ui);font-size:12px;font-weight:700;color:var(--blue);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}.af-group:first-child{margin-top:0}
.af-field{margin-bottom:14px}
.af-field label{display:block;font-family:var(--ui);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.af-field input,.af-field textarea{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;font-family:'Noto Sans KR','Noto Sans TC',var(--ui),sans-serif;font-size:12px;color:var(--t1);outline:none;transition:.2s}
.af-field input:focus,.af-field textarea:focus{border-color:var(--blue)}
.af-field textarea{resize:vertical;min-height:60px}
.logo-area{display:flex;align-items:center;gap:14px;margin-top:4px}
.logo-pv{width:100px;height:42px;border:1px dashed var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg)}
.logo-pv img{max-width:90px;max-height:36px;object-fit:contain}
.up-btn{font-family:var(--ui);font-size:10px;font-weight:600;padding:6px 14px;background:rgba(140,165,220,.1);border:1px solid var(--bd2);color:var(--blue);border-radius:var(--r);cursor:pointer}
.rm-btn{font-family:var(--ui);font-size:10px;padding:6px 12px;background:none;border:1px solid var(--bd);color:var(--t3);border-radius:var(--r);cursor:pointer}
.par-up-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
.par-up-cell{border:1px dashed var(--bd);border-radius:var(--r);padding:8px;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--bg)}
.par-up-cell .pv{width:100%;height:36px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.par-up-cell .pv img{max-width:100%;max-height:32px;object-fit:contain}
.par-up-cell button{font-size:9px;padding:3px 7px;border-radius:2px;cursor:pointer;font-family:var(--ui)}
.pu-rm{background:none;border:1px solid var(--bd);color:var(--t3)}

@media(max-width:1024px){nav{padding:0 24px}.n-links{display:none}section{padding:80px 24px}.about-cols,.obs-cols,.net-cols,.con-cols{grid-template-columns:1fr;gap:40px}.svc-grid{grid-template-columns:1fr 1fr}.af-row{grid-template-columns:1fr}footer{padding:20px 24px}}
@media(max-width:640px){.hero-h{font-size:26px}.svc-grid{grid-template-columns:1fr}.hero-btns{flex-direction:column;align-items:flex-start}footer{flex-direction:column;align-items:flex-start}.par-up-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<nav>
  <a class="n-logo" href="#home" id="nav-logo"><img id="logo-img" alt="VAST MEDIA"><div id="logo-text"><span class="n-en">VAST MEDIA</span><span class="n-cn">皡翰娛樂</span></div></a>
  <ul class="n-links" id="nav-links"></ul>
  <div class="n-right">
    <div class="lang-toggle"><button class="lang-btn on" id="btn-ko" onclick="setLang('ko')">KO</button><button class="lang-btn" id="btn-tc" onclick="setLang('tc')">TC</button></div>
    <a href="#contact" class="n-cta" id="nav-cta"></a>
  </div>
</nav>

<section id="home"><div class="inner hero-inner">
  <div class="hero-tag" id="hero-tag"></div>
  <h1 class="hero-h" id="hero-h"></h1>
  <p class="hero-p" id="hero-p"></p>
  <div class="hero-btns"><a href="#contact" class="btn1" id="hero-b1"></a><a href="#services" class="btn2" id="hero-b2"></a></div>
</div></section>

<div class="divider"></div>

<section id="about"><div class="inner">
  <div class="about-cols">
    <div class="about-left rv">
      <p class="lbl" id="abt-lbl"></p>
      <h2 class="sec-t" id="abt-t" style="margin-bottom:24px"></h2>
      <p id="abt-p1"></p>
      <p id="abt-p2"></p>
      <div class="about-quote" id="abt-q"></div>
    </div>
    <div class="about-right rv">
      <p id="abt-p3"></p>
      <p id="abt-p4"></p>
    </div>
  </div>
</div></section>

<div class="divider"></div>

<section id="services"><div class="inner">
  <div class="rv">
    <p class="lbl" id="svc-lbl"></p>
    <h2 class="sec-t" id="svc-t"></h2>
    <p style="font-size:14px;color:var(--t2);line-height:1.85;margin-top:16px;max-width:560px" id="svc-p"></p>
  </div>
  <div class="svc-grid" id="svc-grid"></div>
</div></section>

<div class="divider"></div>

<section id="observation"><div class="inner">
  <p class="lbl rv" id="obs-lbl"></p>
  <h2 class="sec-t rv" id="obs-t" style="margin-bottom:8px"></h2>
  <div class="obs-cols">
    <div class="obs-left rv">
      <p id="obs-p1"></p>
      <p id="obs-p2"></p>
      <a href="#mi-page" class="obs-link" id="obs-link" onclick="showMI()"></a>
    </div>
    <div class="obs-right rv">
      <h4 id="obs-rt"></h4>
      <p id="obs-r1"></p>
      <p id="obs-r2"></p>
      <p id="obs-r3"></p>
    </div>
  </div>
</div></section>

<div class="divider"></div>

<section id="mi-page"><div class="inner">
  <p class="lbl" id="mi-lbl"></p>
  <h2 class="sec-t" id="mi-t"></h2>
  <p style="font-size:14px;color:var(--t2);line-height:1.85;margin-top:16px;max-width:560px" id="mi-desc"></p>
  <div class="mi-tabs" id="mi-tabs"></div>
  <div id="mi-panels"></div>
  <div class="mi-cta rv"><h3 id="mi-cta-t"></h3><p id="mi-cta-p"></p><a href="#contact" class="btn1" id="mi-cta-b"></a></div>
</div></section>

<div class="divider"></div>

<section id="network"><div class="inner">
  <div class="net-cols">
    <div class="rv">
      <p class="lbl" id="net-lbl"></p>
      <h2 class="sec-t" id="net-t" style="margin-bottom:20px"></h2>
      <div id="net-p" style="font-size:14px;color:var(--t2);line-height:1.9"></div>
    </div>
    <div class="net-right rv" id="net-items"></div>
  </div>
</div></section>

<div class="divider" id="div-par-pre"></div>
<section id="partners"><div class="par-wrap">
  <p class="lbl" style="text-align:center;margin-bottom:16px" id="par-lbl"></p>
  <div class="par-marquee" id="par-mq"></div>
  <p class="par-note" id="par-note"></p>
</div></section>
<div class="divider" id="div-par-post"></div>

<section id="contact"><div class="inner">
  <div class="con-cols">

'mi2.t':'社群與公會文化','mi2.p1':'公會是這個市場 MMORPG 中重要的社交結構。玩家透過公會戰、領地爭奪等活動建立歸屬感，公會參與程度也影響他們是否繼續遊玩。','mi2.p2':'當實況主、公會與一般玩家形成穩定的社群時，遊戲的自然成長會更容易發生。這是台港澳 MMORPG 市場比較明顯的特徵之一。',
'mi2.pts':'公會參與和遊戲持續意願有關|公會間競爭促進社群內的內容產出|穩定的社群結構有助於遊戲的長期運營',
'mi.cta.t':'想了解台港澳市場嗎？','mi.cta.p':'歡迎交流，我們可以從在地觀點提供意見，一起討論合作方案。','mi.cta.b':'立即洽詢 →',
'net.lbl':'MARKET NETWORK','net.t':'網絡結構',
'net.p':'VAST MEDIA 在台港澳 MMORPG 市場中維持著長期的合作關係網絡，涵蓋實況主、公會領袖、攻略創作者以及社群平台。',
'nt0.t':'MMORPG Streamers','nt0.p':'長期直播 MMORPG 類型的實況主。',
'nt1.t':'Guild Leaders','nt1.p':'公會管理者與核心玩家。',
'nt2.t':'Strategy Creators','nt2.p':'攻略作者與數據分析玩家。',
'nt3.t':'Community Platforms','nt3.p':'Discord、論壇與玩家社群。',
'par.lbl':'PARTNERS','par.note':'依合作夥伴要求，詳細內容不對外公開。\n於提案階段將提供相關資料供參考。',
'con.lbl':'CONTACT','con.h':'想聊聊\n<span class="gold">市場合作嗎？</span>',
'con.p':'無論您的計畫在哪個階段，都歡迎與我們交流在地觀點。',
'con.loc':'📍 台北 | 支援港澳及首爾對接','con.lang':'💬 한국어 / 繁中 / English',
'con.fl':'聯絡表單','fl.co':'公司名稱','fl.nm':'聯絡人','fl.tp':'類型','fl.mg':'訊息',
'sel0':'請選擇','sel1':'市場進入合作','sel2':'KOL 網絡','sel3':'公會建立','sel4':'長期合作','sel5':'其他',
'con.sub':'送出 →','con.ta':'請簡述您的遊戲專案與合作需求...',
'f.copy':'© 2025 皡翰娛樂 VAST MEDIA','fn.about':'關於','fn.svc':'服務','fn.con':'聯絡'
}};

let L='ko',cms={},logo=null,pLogos=[];
const PW='vestmedia';
function load(){try{const s=localStorage.getItem('vm');if(s){const p=JSON.parse(s);cms=p.i||{};logo=p.l||null;pLogos=(p.p||[]).filter(x=>x)}}catch(e){}}
function save(){localStorage.setItem('vm',JSON.stringify({i:cms,l:logo,p:pLogos}))}
function g(l,k){return(cms[l]&&cms[l][k]!==undefined)?cms[l][k]:D[l][k]||''}

function render(){
  const li=document.getElementById('logo-img'),lt=document.getElementById('logo-text');
  if(logo){li.src=logo;li.style.display='block';lt.style.display='none'}else{li.style.display='none';lt.style.display='flex'}
  const nl=[['#about','nav.about'],['#services','nav.svc'],['#observation','nav.obs'],['#network','nav.net'],['#contact','nav.con']];
  document.getElementById('nav-links').innerHTML=nl.map(([h,k])=>`<li><a href="${h}">${g(L,k)}</a></li>`).join('');
  document.getElementById('nav-cta').textContent=g(L,'nav.cta');
  document.getElementById('hero-tag').innerHTML=g(L,'hero.tag');
  document.getElementById('hero-h').innerHTML=g(L,'hero.h').replace(/\n/g,'<br>');
  document.getElementById('hero-p').innerHTML=g(L,'hero.p').replace(/\n/g,'<br>');
  document.getElementById('hero-b1').textContent=g(L,'hero.b1');
  document.getElementById('hero-b2').textContent=g(L,'hero.b2');
  document.getElementById('abt-lbl').textContent=g(L,'abt.lbl');
  document.getElementById('abt-t').innerHTML=g(L,'abt.t').replace(/\n/g,'<br>');
  document.getElementById('abt-p1').textContent=g(L,'abt.p1');
  document.getElementById('abt-p2').textContent=g(L,'abt.p2');
  document.getElementById('abt-q').textContent=g(L,'abt.q');
  document.getElementById('abt-p3').textContent=g(L,'abt.p3');
  document.getElementById('abt-p4').textContent=g(L,'abt.p4');
  document.getElementById('svc-lbl').textContent=g(L,'svc.lbl');
  document.getElementById('svc-t').textContent=g(L,'svc.t');
  document.getElementById('svc-p').textContent=g(L,'svc.p');
  document.getElementById('svc-grid').innerHTML=[0,1,2,3,4,5].map(i=>`<div class="svc-card rv"><h3>${g(L,'svc'+i+'.t')}</h3><p>${g(L,'svc'+i+'.p')}</p><span class="svc-tag">${g(L,'svc'+i+'.tag')}</span></div>`).join('');
  document.getElementById('obs-lbl').textContent=g(L,'obs.lbl');
  document.getElementById('obs-t').textContent=g(L,'obs.t');
  document.getElementById('obs-p1').textContent=g(L,'obs.p1');
  document.getElementById('obs-p2').textContent=g(L,'obs.p2');
  document.getElementById('obs-link').textContent=g(L,'obs.link');
  document.getElementById('obs-rt').textContent=g(L,'obs.rt');
  document.getElementById('obs-r1').textContent=g(L,'obs.r1');
  document.getElementById('obs-r2').textContent=g(L,'obs.r2');
  document.getElementById('obs-r3').textContent=g(L,'obs.r3');
  document.getElementById('mi-lbl').textContent=g(L,'mi.lbl');
  document.getElementById('mi-t').innerHTML=g(L,'mi.t').replace(/\n/g,'<br>');
  document.getElementById('mi-desc').textContent=g(L,'mi.desc');
  document.getElementById('mi-tabs').innerHTML=[0,1,2].map(i=>`<button class="mi-tab${i===0?' on':''}" onclick="switchMI(${i})">${g(L,'mi.tab'+i)}</button>`).join('');
  document.getElementById('mi-panels').innerHTML=[0,1,2].map(i=>{
    const pts=g(L,'mi'+i+'.pts').split('|').filter(p=>p.trim());
    return `<div class="mi-panel${i===0?' on':''}" id="mip${i}"><h3>${g(L,'mi'+i+'.t')}</h3><p>${g(L,'mi'+i+'.p1')}</p><p>${g(L,'mi'+i+'.p2')}</p>${pts.length?`<div class="mi-pts">${pts.map(p=>`<div class="mi-pt">${p.trim()}</div>`).join('')}</div>`:''}</div>`;
  }).join('');
  document.getElementById('mi-cta-t').textContent=g(L,'mi.cta.t');
  document.getElementById('mi-cta-p').textContent=g(L,'mi.cta.p');
  document.getElementById('mi-cta-b').textContent=g(L,'mi.cta.b');
  document.getElementById('net-lbl').textContent=g(L,'net.lbl');
  document.getElementById('net-t').textContent=g(L,'net.t');
  document.getElementById('net-p').innerHTML=`<p>${g(L,'net.p')}</p>`;
  document.getElementById('net-items').innerHTML=[0,1,2,3].map(i=>`<div class="net-item"><h4>${g(L,'nt'+i+'.t')}</h4><p>${g(L,'nt'+i+'.p')}</p></div>`).join('');
  document.getElementById('par-lbl').textContent=g(L,'par.lbl');
  const mq=document.getElementById('par-mq');
  if(pLogos.length>0){let ls=[...pLogos];while(ls.length<6)ls=ls.concat(pLogos);const it=ls.map(img=>`<div class="par-item"><img src="${img}" alt="Partner"></div>`).join('');const sp=Math.max(12,ls.length*4);const tr=`<div class="par-track" style="animation-duration:${sp}s">${it}</div>`;mq.innerHTML=tr+tr;document.getElementById('partners').style.display='';document.getElementById('div-par-pre').style.display='';document.getElementById('div-par-post').style.display=''}else{mq.innerHTML='';document.getElementById('partners').style.display='none';document.getElementById('div-par-pre').style.display='none';document.getElementById('div-par-post').style.display='none'}
  document.getElementById('par-note').innerHTML=g(L,'par.note').replace(/\n/g,'<br>');
  document.getElementById('con-lbl').textContent=g(L,'con.lbl');
  document.getElementById('con-h').innerHTML=g(L,'con.h').replace(/\n/g,'<br>');
  document.getElementById('con-p').textContent=g(L,'con.p');
  document.getElementById('con-loc').textContent=g(L,'con.loc');
  document.getElementById('con-lang').textContent=g(L,'con.lang');
  document.getElementById('con-fl').textContent=g(L,'con.fl');
  document.getElementById('fl-co').textContent=g(L,'fl.co');
  document.getElementById('fl-nm').textContent=g(L,'fl.nm');
  document.getElementById('fl-tp').textContent=g(L,'fl.tp');
  document.getElementById('fl-mg').textContent=g(L,'fl.mg');
  document.getElementById('con-sel').innerHTML=[0,1,2,3,4,5].map(i=>`<option>${g(L,'sel'+i)}</option>`).join('');
  document.getElementById('con-ta').placeholder=g(L,'con.ta');
  document.getElementById('con-sub').textContent=g(L,'con.sub');
  document.getElementById('f-copy').textContent=g(L,'f.copy');
  document.getElementById('f-links').innerHTML=`<li><a href="#about">${g(L,'fn.about')}</a></li><li><a href="#services">${g(L,'fn.svc')}</a></li><li><a href="#contact">${g(L,'fn.con')}</a></li>`;
  document.body.className=L==='tc'?'tc':'';
  document.documentElement.lang=L==='ko'?'ko':'zh-TW';
  setTimeout(initRv,50);
}

function setLang(l){L=l;document.getElementById('btn-ko').classList.toggle('on',l==='ko');document.getElementById('btn-tc').classList.toggle('on',l==='tc');render()}
function switchMI(n){document.querySelectorAll('.mi-tab').forEach((t,i)=>t.classList.toggle('on',i===n));document.querySelectorAll('.mi-panel').forEach((p,i)=>p.classList.toggle('on',i===n))}
function showMI(){document.getElementById('mi-page').style.display='block';document.getElementById('mi-page').scrollIntoView({behavior:'smooth'})}

const TABS=['基本','Hero','About','Services','Observation','Insight','Network','Partners','Contact'];
let cTab=0;
function openAdm(){document.getElementById('adm-overlay').classList.add('open');document.getElementById('adm-login').style.display='flex';document.getElementById('adm-editor').style.display='none';document.getElementById('adm-pw').value='';document.getElementById('adm-err').style.display='none'}
function closeAdm(){document.getElementById('adm-overlay').classList.remove('open')}
function admLogin(){if(document.getElementById('adm-pw').value===PW){document.getElementById('adm-login').style.display='none';document.getElementById('adm-editor').style.display='flex';document.getElementById('adm-tabs').innerHTML=TABS.map((t,i)=>`<button class="adm-tab${i===0?' on':''}" onclick="sTab(${i})">${t}</button>`).join('');sTab(0)}else{document.getElementById('adm-err').style.display='block'}}
function sTab(i){cTab=i;document.querySelectorAll('.adm-tab').forEach((t,j)=>t.classList.toggle('on',j===i));rTab(i)}
function fld(label,key,ml){const t=ml?'textarea':'input type="text"',c=ml?'textarea':'input';return `<div class="af-group">${label}</div><div class="af-row"><div class="af-field"><label>KO</label><${t} class="af" data-lang="ko" data-key="${key}">${ml?g('ko',key):''}</${c}></div><div class="af-field"><label>TC</label><${t} class="af" data-lang="tc" data-key="${key}">${ml?g('tc',key):''}</${c}></div></div>`}

function rTab(idx){
  const b=document.getElementById('adm-body');
  const S=[
    ()=>`<div class="af-group">Logo</div><div class="af-field"><label>上傳 Logo</label><div class="logo-area"><div class="logo-pv">${logo?`<img src="${logo}">`:'<span style="font-size:9px;color:var(--t3)">無</span>'}</div><button class="up-btn" onclick="document.getElementById('logo-fi').click()">上傳</button><button class="rm-btn" onclick="logo=null;save();render();rTab(0)">移除</button></div></div>`,
    ()=>`${fld('Tag','hero.tag')}${fld('標題','hero.h',1)}${fld('副標','hero.p',1)}${fld('按鈕 1','hero.b1')}${fld('按鈕 2','hero.b2')}`,
    ()=>`${fld('Label','abt.lbl')}${fld('標題','abt.t',1)}${fld('段落 1','abt.p1',1)}${fld('段落 2','abt.p2',1)}${fld('引言','abt.q',1)}${fld('段落 3','abt.p3',1)}${fld('段落 4','abt.p4',1)}`,
    ()=>`${fld('Label','svc.lbl')}${fld('標題','svc.t')}${fld('說明','svc.p',1)}${[0,1,2,3,4,5].map(i=>`<div class="af-group">服務 ${i+1}</div><div class="af-row"><div class="af-field"><label>標題 KO</label><input type="text" class="af" data-lang="ko" data-key="svc${i}.t"></div><div class="af-field"><label>標題 TC</label><input type="text" class="af" data-lang="tc" data-key="svc${i}.t"></div></div><div class="af-row"><div class="af-field"><label>說明 KO</label><textarea class="af" data-lang="ko" data-key="svc${i}.p"></textarea></div><div class="af-field"><label>說明 TC</label><textarea class="af" data-lang="tc" data-key="svc${i}.p"></textarea></div></div><div class="af-row"><div class="af-field"><label>Tag KO</label><input type="text" class="af" data-lang="ko" data-key="svc${i}.tag"></div><div class="af-field"><label>Tag TC</label><input type="text" class="af" data-lang="tc" data-key="svc${i}.tag"></div></div>`).join('')}`,
    ()=>`${fld('Label','obs.lbl')}${fld('標題','obs.t')}${fld('段落 1','obs.p1',1)}${fld('段落 2','obs.p2',1)}${fld('連結文字','obs.link')}${fld('右欄標題','obs.rt')}${fld('觀察 1','obs.r1',1)}${fld('觀察 2','obs.r2',1)}${fld('觀察 3','obs.r3',1)}`,
    ()=>`${fld('Label','mi.lbl')}${fld('標題','mi.t',1)}${fld('說明','mi.desc',1)}${[0,1,2].map(i=>`${fld('Tab '+(i+1),'mi.tab'+i)}<div class="af-group">內容 ${i+1}</div><div class="af-row"><div class="af-field"><label>標題 KO</label><input type="text" class="af" data-lang="ko" data-key="mi${i}.t"></div><div class="af-field"><label>標題 TC</label><input type="text" class="af" data-lang="tc" data-key="mi${i}.t"></div></div><div class="af-row"><div class="af-field"><label>段落 1 KO</label><textarea class="af" data-lang="ko" data-key="mi${i}.p1"></textarea></div><div class="af-field"><label>段落 1 TC</label><textarea class="af" data-lang="tc" data-key="mi${i}.p1"></textarea></div></div><div class="af-row"><div class="af-field"><label>段落 2 KO</label><textarea class="af" data-lang="ko" data-key="mi${i}.p2"></textarea></div><div class="af-field"><label>段落 2 TC</label><textarea class="af" data-lang="tc" data-key="mi${i}.p2"></textarea></div></div><div class="af-row"><div class="af-field"><label>重點(|分隔) KO</label><textarea class="af" data-lang="ko" data-key="mi${i}.pts"></textarea></div><div class="af-field"><label>重點(|分隔) TC</label><textarea class="af" data-lang="tc" data-key="mi${i}.pts"></textarea></div></div>`).join('')}${fld('CTA 標題','mi.cta.t')}${fld('CTA 說明','mi.cta.p',1)}${fld('CTA 按鈕','mi.cta.b')}`,
    ()=>`${fld('Label','net.lbl')}${fld('標題','net.t')}${fld('說明','net.p',1)}${[0,1,2,3].map(i=>`<div class="af-group">類型 ${i+1}</div><div class="af-row"><div class="af-field"><label>標題 KO</label><input type="text" class="af" data-lang="ko" data-key="nt${i}.t"></div><div class="af-field"><label>標題 TC</label><input type="text" class="af" data-lang="tc" data-key="nt${i}.t"></div></div><div class="af-row"><div class="af-field"><label>說明 KO</label><textarea class="af" data-lang="ko" data-key="nt${i}.p"></textarea></div><div class="af-field"><label>說明 TC</label><textarea class="af" data-lang="tc" data-key="nt${i}.p"></textarea></div></div>`).join('')}`,
    ()=>`<div class="af-group">合作夥伴 Logo</div><p style="font-family:var(--ui);font-size:11px;color:var(--t3);margin-bottom:10px">上傳幾個就顯示幾個。</p>${pLogos.length?`<div class="par-up-grid">${pLogos.map((img,i)=>`<div class="par-up-cell"><div class="pv"><img src="${img}"></div><button class="pu-rm" onclick="rmPar(${i})">移除</button></div>`).join('')}</div>`:'<p style="font-size:11px;color:var(--t3);margin:12px 0">尚未上傳</p>'}<button class="up-btn" onclick="document.getElementById('par-fi').click()" style="margin-top:10px">＋ 新增</button>${fld('備註','par.note',1)}`,
    ()=>`${fld('Label','con.lbl')}${fld('標題','con.h',1)}${fld('說明','con.p',1)}${fld('地點','con.loc')}${fld('語言','con.lang')}${fld('版權','f.copy')}`
  ];
  b.innerHTML=S[idx]();
  b.querySelectorAll('.af').forEach(el=>{const v=g(el.dataset.lang,el.dataset.key);if(el.tagName==='TEXTAREA'){if(!el.textContent.trim())el.value=v}else el.value=v});
}

function saveAdm(){
  if(!cms.ko)cms.ko={};if(!cms.tc)cms.tc={};
  document.querySelectorAll('.af').forEach(el=>{const l=el.dataset.lang,k=el.dataset.key;if(!cms[l])cms[l]={};cms[l][k]=el.value;if(k.match(/^(nt[0-3]\.i)$/)){cms.tc[k]=el.value;cms.ko[k]=el.value}});
  save();render();const m=document.getElementById('adm-ok');m.style.display='block';setTimeout(()=>m.style.display='none',2e3);
}
function resetAdm(){if(!confirm('確定重置？'))return;cms={};logo=null;pLogos=[];localStorage.removeItem('vm');render();sTab(cTab)}
function rmPar(i){pLogos.splice(i,1);save();rTab(7);render()}

document.getElementById('logo-fi').addEventListener('change',function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{logo=e.target.result;save();render();rTab(0)};r.readAsDataURL(f);this.value=''});
document.getElementById('par-fi').addEventListener('change',function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{pLogos.push(e.target.result);save();rTab(7);render()};r.readAsDataURL(f);this.value=''});

function initRv(){const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('v')})},{threshold:.08,rootMargin:'0px 0px -30px 0px'});document.querySelectorAll('.rv').forEach(el=>{el.classList.remove('v');o.observe(el)})}

function chkAdm(){if(location.hash==='#admin'||location.pathname==='/admin'){setTimeout(openAdm,100);history.replaceState(null,'',location.pathname==='/admin'?'/':location.pathname)}}
window.addEventListener('hashchange',chkAdm);
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey&&e.key==='A'){e.preventDefault();openAdm()}});
document.getElementById('adm-overlay').addEventListener('click',function(e){if(e.target===this)closeAdm()});

load();render();chkAdm();
</script>
</body>
</html>
